# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.12.0"
  python_min: "3.11"
  pytest_k: not (multilevel_modules_on_physical or multilevel_modules_states or precomputed)
  cov_fail_under: "63"

package:
  name: python-infomap
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/i/infomap/infomap-${{ version }}.tar.gz
    sha256: fc3da6567d054a9daa2f047115c023f8e15853529a286a349da0ee3b13644e76
    target_directory: dist
    patches:
      - if: win
        then: 0000-no-win-clang.patch
  - url: https://github.com/mapequation/infomap/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 3e470218f2e9e4b7d6f28fe44e3f193ce0ac85b6aece115dac2cbfcb0717f0f4
    target_directory: src

build:
  number: 0
  skip: match(python, "<" ~ python_min)
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - infomap = infomap:main
      - infomap-shell = infomap.shell:main

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - if: osx
      then:
        - llvm-openmp
    - if: linux
      then:
        - libgomp
  host:
    - pip
    - python
    - setuptools >=68
  run:
    - python

tests:
  - python:
      imports: infomap
      pip_check: true
  - files:
      source:
        - src/examples/networks/
        - src/mk/python.mk
        - src/pyproject.toml
        - src/scripts/
        - src/setup.py
        - src/src/
        - src/test/
    requirements:
      run:
        - anndata
        - coverage
        - igraph
        - jsonschema >=4.18
        - networkx
        - pyarrow
        - pytest
        - referencing
        - scipy
    script:
      - infomap --version
      - infomap --version | ${{ "grep -iE" if unix else "findstr" }} " ${{ version | replace(".", "\\.") }} "
      - infomap --help
      - infomap-shell --help
      - cd src
      - coverage run --source=infomap --branch -m pytest -vv --tb=long --color=yes -k "${{ pytest_k }}"
      - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  license: GPL-3.0-or-later
  license_file: dist/LICENSE_GPLv3.txt
  summary: Infomap network clustering algorithm
  homepage: https://pypi.org/project/infomap
  repository: https://github.com/mapequation/infomap/tree/master/interfaces/python
  documentation: https://mapequation.github.io/infomap/python

extra:
  recipe-maintainers:
    - bollwyvl
