# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "2.15.0"
  python_min: "3.11"
  pytest_k_all: |-
    multilevel_modules_on_physical or multilevel_modules_states or precomputed or cli_main_exits_130_on_sigint or marker_block_present
  pytest_k_win: |-
    or (logging and (propagated_root_handlers_do_not_engage_routing or routing_disengages_when_handlers_are_removed)) or (run_functional and (run_options_mapping_silent_false_prints_engine_log or run_silent_false_override_prints_engine_log or stateful_infomap_silent_false_prints_engine_log))
  pytest_k: not ( ${{ pytest_k_all }} ${{ pytest_k_win if win }} )
  no_anndata: ${{ is_freethreading and target_platform in ["linux-ppc64le", "osx-64"] }}
  cov_fail_under: ${{ "62" if no_anndata else "72" }}

package:
  name: python-infomap
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/i/infomap/infomap-${{ version }}.tar.gz
    sha256: 144c8d73fcf7acd017eb5f0e539c1eb0391db7e81381470a2c432aab15bb4041
    target_directory: dist
    patches:
      - if: win
        then: 0000-no-win-clang.patch
  - url: https://github.com/mapequation/infomap/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 4d3b72852f335495357ab568de4747e4f0bbb4904169d8eeda30c8642859f6c1
    target_directory: src

build:
  number: 0
  skip: match(python, "<" ~ python_min)
  script:
    - cd dist
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - infomap = infomap:main
      - infomap-shell = infomap.shell:main

requirements:
  build:
    - ${{ compiler("cxx") }}
    - ${{ stdlib("c") }}
    - if: osx
      then:
        - llvm-openmp
    - if: linux
      then:
        - libgomp
  host:
    - pip
    - python
    - setuptools >=68
  run:
    - python

tests:
  - python:
      imports: infomap
      pip_check: true
  - files:
      source:
        - src/examples/networks/
        - src/interfaces/parameters/overrides.json
        - src/mk/python.mk
        - src/pyproject.toml
        - src/scripts/
        - src/setup.py
        - src/src/
        - src/test/
    requirements:
      run:
        - coverage
        - igraph
        - jsonschema >=4.18
        - networkx
        - pandas
        - pyarrow
        - pytest
        - referencing
        - scipy
        - if: not no_anndata
          then:
            - anndata
    script:
      - infomap --version
      - infomap --version | ${{ "grep -iE" if unix else "findstr" }} " ${{ version | replace(".", "\\.") }} "
      - infomap --help
      - infomap-shell --help
      - cd src
      - coverage run --source=infomap --branch -m pytest -vv --tb=long --color=yes -k "${{ pytest_k }}"
      - coverage report --show-missing --skip-covered --fail-under=${{ cov_fail_under }}

about:
  license: GPL-3.0-or-later
  license_file: dist/LICENSE_GPLv3.txt
  summary: Infomap network clustering algorithm
  homepage: https://pypi.org/project/infomap
  repository: https://github.com/mapequation/infomap/tree/master/interfaces/python
  documentation: https://mapequation.github.io/infomap/python

extra:
  recipe-maintainers:
    - bollwyvl
